name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Create venv
        run: uv venv --python ${{ matrix.python }}
      - name: Install (dev)
        run: uv pip install -e ".[dev]"
      - name: Unit tests (divergence golden + pad-mask non-vacuous + throughput smoke)
        run: uv run --no-sync pytest -q

  lint:
    name: lint (ruff + mypy strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"
      - run: uv run --no-sync ruff check src tests
      - run: uv run --no-sync mypy src/dtwarp

  honest-marketing:
    name: honest-marketing gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv venv --python 3.12
      - run: uv pip install -e .
      - name: No unsupported claims / hand-written benchmark numbers (self-testing scanner)
        run: uv run --no-sync python scripts/check_honest_marketing.py
